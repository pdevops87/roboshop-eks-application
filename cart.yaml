apiVersion: v1
kind: ConfigMap
metadata:
  name: cart-cmap
data:
  CATALOGUE_HOST: "catalogue"
  CATALOGUE_PORT: "8080"
  REDIS_HOST: "redis-dev.pdevops78.online"

---
apiVersion: v1
kind: Service
metadata:
  name: cart
spec:
  selector:
    appName: cart
  ports:
    - port: 8080 # Service port
      targetPort: 8080  # Pod container port
  type: ClusterIP # by default cluster ip

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cart
  labels:
    appName: cart
spec:
  replicas: 1
  selector:
    matchLabels:
      appName: cart
  template:
    metadata:
      labels:
        appName: cart
    spec:
      containers:
        - name: cart
          image: public.ecr.aws/w8x4g9h7/roboshop-v3/cart
          envFrom:
            - configMapRef:
                name: cart-cmap



