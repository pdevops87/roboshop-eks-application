apiVersion: v1
kind: ConfigMap
metadata:
  name: user-cmap
data:
  MONGO: "catalogue"
  MONGO_URL: "mongodb://172.31.66.149:27017/users"
  REDIS_URL: "redis://172.31.69.229:6379"

---
apiVersion: v1
kind: Service
metadata:
  name: user
spec:
  selector:
    appName: user
  ports:
    - port: 8080 # Service port
      targetPort: 8080  # Pod container port
  type: ClusterIP # by default cluster ip

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user
  labels:
    appName: user
spec:
  replicas: 1
  selector:
    matchLabels:
      appName: user
  template:
    metadata:
      labels:
        appName: user
    spec:
      containers:
        - name: user
          image: public.ecr.aws/w8x4g9h7/roboshop-v3/user
          env:
            env:
             - name: INSTANA_ENABLED
               value: "false"
          envFrom:
            - configMapRef:
                name: user-cmap



